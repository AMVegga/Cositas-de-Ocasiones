<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Cositas de Ocasiones</title>

<style>
:root{
  --wood-1:#3b2f2a;
  --wood-2:#6b4f3e;
  --wood-3:#a77b58;
  --accent:#ffd1a9;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background-image:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url("fondo.png");
  background-size:cover;
  background-attachment:fixed;
}
header{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,var(--wood-1),var(--wood-2));
  color:var(--accent);
}
header a{
  border:1px solid var(--accent);
  color:var(--accent);
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
}
main{max-width:900px;margin:0 auto;padding:16px}
.hidden{display:none}

form,.card{
  background:#cca788;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #dcc7b0;
}
button{
  padding:10px 12px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  background:var(--wood-2);
  color:var(--accent);
}
button.danger{background:#8b2f2f}
.product-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

button,
.btn {
  transition: 
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background-color 0.15s ease;
    
}

/* Hover */
button:hover,
.btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

/* Click */
button:active,
.btn:active {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

/* Focus accesible */
button:focus-visible,
.btn:focus-visible {
  outline: 2px solid #ffd1a9;
  outline-offset: 2px;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:8px;
}
@media(max-width:600px){
  header{flex-direction:column;gap:10px}
}
</style>
</head>

<body>

<header>
  <h1>Administrador</h1>
  <nav>
    <a href="index.html">Catálogo</a>
  </nav>
</header>

<main>

<!-- LOGIN -->
<section id="loginBox">
  <form id="loginForm">
    <h2>Acceso Admin</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button type="submit">Ingresar</button>
  </form>
</section>

<!-- PANEL -->
<section id="panel" class="hidden">

<h2 style="color: #ffd1a9;">Agregar / Editar Producto</h2>
<form id="productForm">
  <input type="hidden" id="productId">

  <input id="title" placeholder="Nombre del producto" required>
  <textarea id="description" placeholder="Descripción" required></textarea>
  <input id="price" type="number" placeholder="Precio" required>

  <input type="file" id="images" multiple accept="image/*">

  <button type="submit">Guardar</button>
  <button type="button" class="danger hidden" id="cancelEdit">Cancelar</button>
</form>

<h2 style="color: #ffd1a9;">Productos</h2>
<div id="productList" class="product-list"></div>

<button class="danger" onclick="logout()">Cerrar sesión</button>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient(
  "https://qbejboipricdftbvwvoq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZWpib2lwcmljZGZ0YnZ3dm9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyODA5NDYsImV4cCI6MjA4MTg1Njk0Nn0.XjMDRDGE39zWmGndfhKicU_ZCoPrk4UTK3Hqs0KqlcI"
);
const imagesInput = document.getElementById("images");
const loginBox = document.getElementById("loginBox");
const panel = document.getElementById("panel");

let alreadyRendered = false;

supabaseClient.auth.onAuthStateChange((_, session) => {
  loginBox.classList.toggle("hidden", !!session);
  panel.classList.toggle("hidden", !session);

  if (session && !alreadyRendered) {
    renderProductList();
    alreadyRendered = true;
  }
});

// LOGIN
loginForm.onsubmit = async e=>{
  e.preventDefault();
  await supabaseClient.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
};

// LOGOUT
function logout(){
  supabaseClient.auth.signOut();
}

// IMÁGENES
async function uploadImages(files){
  let urls = [];

  for (let file of files) {
    const name = crypto.randomUUID() + "-" + file.name;

    const { error } = await supabaseClient
      .storage
      .from("product-images")
      .upload(name, file);

    if (error) {
      console.error("Error subiendo imagen:", error);
      alert("Error subiendo imagen. Revisa el bucket.");
      return [];
    }

    const { data } = supabaseClient
      .storage
      .from("product-images")
      .getPublicUrl(name);

    urls.push(data.publicUrl);
  }

  return urls;
}

// CRUD
async function getProducts(){
  const {data}=await supabaseClient.from("products").select("*").order("created_at",{ascending:false});
  return data||[];
}

async function renderProductList(){
  productList.innerHTML="";
  const products=await getProducts();
  products.forEach(p=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <img src="${p.images?.[0]||""}">
      <h3>${p.title}</h3>
      <p>${p.description}</p>
      <p>S/.${p.price}</p>
      <button onclick='edit(${JSON.stringify(p)})'>Editar</button>
      <button class="danger" onclick="remove('${p.id}')">Eliminar</button>
      <button onclick="toggleSold('${p.id}', ${p.sold})">${p.sold ? "Desmarcar" : "Marcar como vendido"}</button>
    `;
    productList.appendChild(c);
  });
}

async function toggleSold(productId, currentState) {
  const { error } = await supabaseClient
    .from("products")
    .update({ sold: !currentState })
    .eq("id", productId);

  if (error) {
    alert("Error al actualizar estado");
    console.error(error);
    return;
  }

  await renderProductList();
}

function edit(p){
  productId.value=p.id;
  title.value=p.title;
  description.value=p.description;
  price.value=p.price;
  cancelEdit.classList.remove("hidden");
}

cancelEdit.onclick=()=>{
  productForm.reset();
  productId.value="";
  cancelEdit.classList.add("hidden");
};

productForm.onsubmit=async e=>{
  e.preventDefault();
  const files = [...imagesInput.files].slice(0,3);
  let imgs=[];
  if(files.length) imgs=await uploadImages(files);

  const data={
    title:title.value,
    description:description.value,
    price:price.value
  };
  if(imgs.length) data.images=imgs;

  if(productId.value){
    await supabaseClient.from("products").update(data).eq("id",productId.value);
  }else{
    data.images=imgs;
    await supabaseClient.from("products").insert(data);
  }

  productForm.reset();
  productId.value="";
  cancelEdit.classList.add("hidden");
  renderProductList();
};

async function remove(id){
  if(confirm("¿Eliminar producto?")){
    await supabaseClient.from("products").delete().eq("id",id);
    renderProductList();
  }
}
</script>

</body>
</html>
